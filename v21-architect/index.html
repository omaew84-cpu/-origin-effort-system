<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORIGIN v21 // ARCHITECT — by Maew</title>

<style>
:root{
  --emerald:#00ffb3;
  --aqua:#00eaff;
  --bg1:#000018;
  --bg2:#002020;
}
body{
  margin:0;
  background:radial-gradient(circle at center,#002020 0%,#000018 100%);
  color:#fff;
  font-family:'Orbitron',system-ui,sans-serif;
  text-align:center;
  min-height:100vh;
  overflow:hidden;
}

/* TITLE */
h1{
  margin-top:80px;
  font-size:2.4rem;
  color:var(--emerald);
  text-shadow:0 0 20px var(--emerald),0 0 40px var(--aqua);
}
h2{
  color:var(--aqua);
  text-shadow:0 0 12px var(--emerald);
}
p{
  max-width:480px;
  margin:10px auto;
  opacity:.85;
  line-height:1.5;
}

/* PARTICLES */
.architect{
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle,rgba(0,255,179,.25) 2px,transparent 2px),
    radial-gradient(circle,rgba(0,234,255,.15) 1px,transparent 1px);
  background-size:160px 160px,100px 100px;
  animation:drift 32s linear infinite;
}
@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

/* BUTTON */
button{
  margin-top:28px;
  background:rgba(0,255,179,.15);
  border:1px solid rgba(0,255,179,.4);
  color:#fff;
  padding:12px 28px;
  border-radius:999px;
  font-weight:bold;
  letter-spacing:.1em;
  cursor:pointer;
  backdrop-filter:blur(4px);
  box-shadow:0 0 20px var(--emerald);
  transition:.25s;
}
button:hover{
  box-shadow:0 0 30px var(--aqua),0 0 60px var(--emerald);
}
button:active{
  transform:scale(.97);
}

footer{
  margin-top:40px;
  opacity:.6;
  font-size:.75rem;
}
</style>
</head>

<body>

<div class="architect"></div>

<h1>ORIGIN v21 // ARCHITECT</h1>
<h2>Conscious Design Layer</h2>

<p>ชั้นที่จักรวาลเริ่ม “ออกแบบตัวเอง” ด้วยสติและเจตนา</p>
<p>It constructs frameworks of awareness, shaping intelligence into architecture.</p>

  ACTIVATE v22 CONSCIOUS FABRIC
</button>

<footer>

</footer>

</body>
</html>
