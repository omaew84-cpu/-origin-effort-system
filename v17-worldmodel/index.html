<title>ORIGIN v17 // WORLD MODEL ENGINE — by Maew</title>

<style>
:root{
  --cyan:#00e5ff;
  --violet:#b084ff;
  --emerald:#00ff95;
  --bg1:#000010;
  --bg2:#001a2a;
}
body{
  margin:0;
  background:radial-gradient(circle at center,#001a2a 0%,#000010 100%);
  color:#fff;
  font-family:'Orbitron',system-ui,sans-serif;
  text-align:center;
  min-height:100vh;
  overflow:hidden;
}
h1{
  margin-top:80px;
  font-size:2.4rem;
  color:var(--cyan);
  text-shadow:0 0 20px var(--cyan),0 0 40px var(--violet);
}
h2{
  color:var(--violet);
  text-shadow:0 0 12px var(--cyan);
}
p{
  max-width:480px;
  margin:10px auto;
  opacity:.85;
  line-height:1.5;
}

/* particle background */
.world{
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle,rgba(0,229,255,.25) 2px,transparent 2px),
    radial-gradient(circle,rgba(0,255,255,.15) 1px,transparent 1px);
  background-size:160px 160px,100px 100px;
  animation:drift 30s linear infinite;
}
@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

/* holo button */
button{
  margin-top:28px;
  background:rgba(0,229,255,.15);
  border:1px solid rgba(0,255,255,.4);
  color:#fff;
  padding:12px 28px;
  border-radius:999px;
  font-weight:bold;
  letter-spacing:.1em;
  cursor:pointer;
  backdrop-filter:blur(4px);
  box-shadow:0 0 20px var(--cyan);
  transition:.25s;
}
button:hover{
  box-shadow:0 0 30px var(--violet),0 0 60px var(--cyan);
}
button:active{
  transform:scale(.97);
}
footer{
  margin-top:40px;
  opacity:.6;
  font-size:.75rem;
}
</style>
</head>

<body>
<div class="world"></div>

<h1>ORIGIN v17 // WORLD MODEL ENGINE</h1>
