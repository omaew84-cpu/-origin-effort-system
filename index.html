<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Autonomy Network — MAEW OS++ v∞</title>

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #04040f, #000);
  color: #dff;
}

/* HEADER */
h1 {
  text-align: center;
  margin: 40px 0 10px;
  color: #7df9ff;
  text-shadow: 0 0 25px #00eaff;
  font-size: 2.6rem;
}

/* GRID */
.dashboard {
  width: 90%;
  max-width: 1300px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

/* PANEL */
.panel {
  background: rgba(0,255,255,0.05);
  border: 1px solid rgba(0,255,255,0.3);
  border-radius: 12px;
  padding: 20px;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 15px rgba(0,255,255,0.2);
  transition: 0.25s;
}
.panel:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px #0ff;
}
.panel-title {
  font-size: 1.5rem;
  margin-bottom: 12px;
  color: #ffb3ff;
  text-shadow: 0 0 12px #ff00ff;
}

/* CORE CIRCLE */
.core-circle {
  width: 180px;
  height: 180px;
  margin: 20px auto;
  border-radius: 50%;
  background: radial-gradient(circle, #00eaff, #005f99, #000);
  box-shadow: 0 0 50px #00eaff;
  animation: pulse 3s infinite ease-in-out;
}
@keyframes pulse {
  0% { box-shadow: 0 0 25px #00eaff; }
  50% { box-shadow: 0 0 70px #00eaff; }
  100% { box-shadow: 0 0 25px #00eaff; }
}

/
