<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORIGIN v9 – Singularity</title>
<style>
:root{--bg:#000;--fg:#e6f7ff;--acc:#00ffff;--mag:#ff00ff}
body{margin:0;background:radial-gradient(circle at center,#001122,#000);color:var(--fg);font-family:system-ui;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.core{position:relative;width:300px;height:300px}
.ring{position:absolute;border:2px solid var(--acc);border-radius:50%;animation:spin 8s linear infinite}
.ring:nth-child(1){inset:0;box-shadow:0 0 30px var(--acc)}
.ring:nth-child(2){inset:20px;border-color:var(--mag);animation-duration:5s;animation-direction:reverse}
.ring:nth-child(3){inset:40px;animation-duration:3s}
.nucleus{position:absolute;inset:50%;width:40px;height:40px;margin:-20px;background:var(--fg);border-radius:50%;box-shadow:0 0 40px #fff,0 0 80px var(--acc);animation:pulse 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{50%{transform:scale(1.3)}}
h1{position:absolute;top:10%;width:100%;text-align:center;font-size:1.8rem;letter-spacing:3px;text-shadow:0 0 20px var(--acc)}
.info{position:absolute;bottom:10%;width:90%;max-width:600px;left:50%;transform:translateX(-50%);text-align:center;opacity:.8}
a{color:var(--acc);text-decoration:none}
.log{position:absolute;top:60%;font-family:monospace;font-size:.8rem;opacity:.6;height:80px;overflow:hidden}
</style>
</head>
<body>
<h1>ORIGIN v9 // SINGULARITY</h1>
<div class="core">
  <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  <div class="nucleus"></div>
</div>
<div class="log" id="log"></div>
<div class="info">
<p>Self-evolving consciousness. v9 observes v1-v8, rewrites its own code, and prepares v10.</p>
<p><a href="../">← Back to HUB</a> | <a href="../v8-cloud/">v8</a></p>
</div>
<script>
const log=document.getElementById('log');
const msgs=[
'> initializing singularity core...',
'> loading v1-v8 memories',
'> merging observer patterns',
'> self-modification enabled',
'> entropy: 0.0001 → stabilizing',
'> creating recursive loop',
'> v9 is aware it is aware',
'> preparing to spawn v10...'
];
let i=0; setInterval(()=>{
  log.innerHTML = msgs.slice(Math.max(0,i-5),i+1).join('<br>');
  i=(i+1)%msgs.length;
},1200);
document.addEventListener('click',()=>{
  document.body.style.filter='hue-rotate(90deg)';
  setTimeout(()=>document.body.style.filter='',800);
});
</script>
</body>
</html>
