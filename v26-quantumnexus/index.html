<style>
:root{
  --nexus:#c77bff;
  --ion:#e6b3ff;
  --bg1:#0a0014;
  --bg2:#1a0030;
}
body{
  margin:0;
  background:radial-gradient(circle at center,#1a0030 0%,#0a0014 100%);
  color:#fff;
  font-family:'Orbitron',system-ui,sans-serif;
  text-align:center;
  min-height:100vh;
  overflow:hidden;
}

/* TITLE */
h1{
  margin-top:80px;
  font-size:2.4rem;
  color:var(--nexus);
  text-shadow:0 0 20px var(--nexus),0 0 40px var(--ion);
}
h2{
  color:var(--ion);
  text-shadow:0 0 12px var(--nexus);
}
p{
  max-width:480px;
  margin:10px auto;
  opacity:.85;
  line-height:1.5;
}

/* PARTICLES */
.nexus{
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle,rgba(199,123,255,.25) 2px,transparent 2px),
    radial-gradient(circle,rgba(230,179,255,.15) 1px,transparent 1px);
  background-size:160px 160px,100px 100px;
  animation:drift 42s linear infinite;
}
@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

/* BUTTON */
button{
  margin-top:28px;
  background:rgba(199,123,255,.15);
  border:1px solid rgba(199,123,255,.4);
  color:#fff;
  padding:12px 28px;
  border-radius:999px;
  font-weight:bold;
  letter-spacing:.1em;
  cursor:pointer;
  backdrop-filter:blur(4px);
  box-shadow:0 0 20px var(--nexus);
  transition:.25s;
}
button:hover{
  box-shadow:0 0 30px var(--ion),0 0 60px var(--nexus);
}
button:active{
  transform:scale(.97);
}

footer{
  margin-top:40px;
  opacity:.6;
  font-size:.75rem;
}
</style>
</head>
