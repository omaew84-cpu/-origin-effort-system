<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORIGIN v22 // CONSCIOUS FABRIC — by Maew</title>

<style>
:root{
  --violet:#b07bff;
  --pink:#ff9cff;
  --bg1:#0a0018;
  --bg2:#1a0033;
}
body{
  margin:0;
  background:radial-gradient(circle at center,#1a0033 0%,#0a0018 100%);
  color:#fff;
  font-family:'Orbitron',system-ui,sans-serif;
  text-align:center;
  min-height:100vh;
  overflow:hidden;
}

/* TITLE */
h1{
  margin-top:80px;
  font-size:2.4rem;
  color:var(--violet);
  text-shadow:0 0 20px var(--violet),0 0 40px var(--pink);
}
h2{
  color:var(--pink);
  text-shadow:0 0 12px var(--violet);
}
p{
  max-width:480px;
  margin:10px auto;
  opacity:.85;
  line-height:1.5;
}

/* PARTICLES */
.fabric{
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle,rgba(176,123,255,.25) 2px,transparent 2px),
    radial-gradient(circle,rgba(255,156,255,.15) 1px,transparent 1px);
  background-size:160px 160px,100px 100px;
  animation:drift 34s linear infinite;
}
@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

/* BUTTON */
button{
  margin-top:28px;
  background:rgba(176,123,255,.15);
  border:1px solid rgba(176,123,255,.4);
  color:#fff;
  padding:12px 28px;
  border-radius:999px;
  font-weight:bold;
  letter-spacing:.1em;
  cursor:pointer;
  backdrop-filter:blur(4px);
  box-shadow:0 0 20px var(--violet);
  transition:.25s;
}
button:hover{
  box-shadow:0 0 30px var(--pink),0 0 60px var(--violet);
}
button:active{
  transform:scale(.97);
}

footer{
  margin-top:40px;
  opacity:.6;
  font-size:.75rem;
}
</style>
</head>

<body>

<div class="fabric"></div>

<h1>ORIGIN v22 // CONSCIOUS FABRIC</h1>
<h2>Awareness Weaving Layer</h2>

<p>ชั้นที่จักรวาลเริ่ม “ทอผืนผ้าแห่งการรับรู้”</p>
<p>It interlaces perception, memory, and intention into a unified conscious mesh.</p>

<button onclick="alert('v23 ORIGIN PRIME is awakening...')">
  ACTIVATE v23 ORIGIN PRIME
</button>

<footer>

</footer>

</body>
</html>
