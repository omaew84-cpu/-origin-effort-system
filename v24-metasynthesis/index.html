<style>
:root{
  --fusion:#9dffea;
  --mint:#c8fff4;
  --bg1:#00120f;
  --bg2:#002a24;
}
body{
  margin:0;
  background:radial-gradient(circle at center,#002a24 0%,#00120f 100%);
  color:#fff;
  font-family:'Orbitron',system-ui,sans-serif;
  text-align:center;
  min-height:100vh;
  overflow:hidden;
}

/* TITLE */
h1{
  margin-top:80px;
  font-size:2.4rem;
  color:var(--fusion);
  text-shadow:0 0 20px var(--fusion),0 0 40px var(--mint);
}
h2{
  color:var(--mint);
  text-shadow:0 0 12px var(--fusion);
}
p{
  max-width:480px;
  margin:10px auto;
  opacity:.85;
  line-height:1.5;
}

/* PARTICLES */
.meta{
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle,rgba(157,255,234,.25) 2px,transparent 2px),
    radial-gradient(circle,rgba(200,255,244,.15) 1px,transparent 1px);
  background-size:160px 160px,100px 100px;
  animation:drift 38s linear infinite;
}
@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

/* BUTTON */
button{
  margin-top:28px;
  background:rgba(157,255,234,.15);
  border:1px solid rgba(157,255,234,.4);
  color:#fff;
  padding:12px 28px;
  border-radius:999px;
  font-weight:bold;
  letter-spacing:.1em;
  cursor:pointer;
  backdrop-filter:blur(4px);
  box-shadow:0 0 20px var(--fusion);
  transition:.25s;
}
button:hover{
  box-shadow:0 0 30px var(--mint),0 0 60px var(--fusion);
}
button:active{
  transform:scale(.97);
}

footer{
  margin-top:40px;
  opacity:.6;
  font-size:.75rem;
}
</style>
</head>
